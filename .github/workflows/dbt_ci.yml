name: Vendor Intelligence CI/CD Pipeline

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Validate model_config.yml structure ──────────────────────────
  validate-config:
    name: Validate Config File
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate model_config.yml
        run: python scripts/validate_config.py --config config/model_config.yml

  # ── Job 2: Load config to Snowflake ─────────────────────────────────────
  load-config:
    name: Load Config to Snowflake
    runs-on: ubuntu-latest
    needs: validate-config
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install -r scripts/requirements.txt

      - name: Load model_config.yml to Snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: COMPUTE_WH
          SNOWFLAKE_DATABASE: LEARNING_DB
          SNOWFLAKE_ROLE: SYSADMIN
        run: |
          python scripts/load_config_to_snowflake.py \
            --config config/model_config.yml

  # ── Job 3: Run dbt compile, run, test ───────────────────────────────────
  dbt-run:
    name: dbt Compile, Run, and Test
    runs-on: ubuntu-latest
    needs: load-config
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      - name: Write dbt profiles.yml from secrets
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          vendor_demo:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: SYSADMIN
                database: LEARNING_DB
                warehouse: COMPUTE_WH
                schema: CI_STAGING
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Install dbt packages
        working-directory: dbt/vendor_demo
        run: dbt deps

      - name: Compile dbt models
        working-directory: dbt/vendor_demo
        run: dbt compile --target ci

      - name: Run dbt models
        working-directory: dbt/vendor_demo
        run: dbt run --target ci

      - name: Run dbt tests
        working-directory: dbt/vendor_demo
        run: dbt test --target ci

      - name: Generate dbt documentation
        working-directory: dbt/vendor_demo
        run: dbt docs generate --target ci

      - name: Upload dbt docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/vendor_demo/target/
          retention-days: 7

  # ── Job 4: Notify on success or failure ─────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: dbt-run
    if: always()
    steps:
      - name: Report success
        if: needs.dbt-run.result == 'success'
        run: |
          echo "========================================="
          echo "  DEPLOYMENT SUCCESSFUL"
          echo "========================================="
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Author:  ${{ github.actor }}"
          echo "  Status:  All dbt models passed"
          echo "========================================="

      - name: Report failure
        if: needs.dbt-run.result == 'failure'
        run: |
          echo "========================================="
          echo "  DEPLOYMENT FAILED — merge blocked"
          echo "========================================="
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Author:  ${{ github.actor }}"
          echo ""
          echo "  Check the dbt-run job logs above to see"
          echo "  which model or test failed."
          echo ""
          echo "  Common fixes:"
          echo "  - Run: dbt test --select <model_name>"
          echo "  - Check accepted_values in schema.yml"
          echo "  - Verify source data in Snowflake RAW schema"
          echo "========================================="
          exit 1
