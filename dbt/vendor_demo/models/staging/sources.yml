version: 2

sources:
  - name: raw
    database: LEARNING_DB
    schema: RAW
    description: "Raw landing zone — construction project data as-is from Apex Build Co systems."
    tables:
      - name: projects
        description: "Master project registry for all active and completed construction projects. One row per project."
        columns:
          - name: PROJECT_ID
            description: "Unique project ID from the project management system (primary key)."
          - name: PROJECT_NAME
            description: "Descriptive name of the construction project."
          - name: CLIENT_NAME
            description: "Name of the client or project owner."
          - name: PROJECT_TYPE
            description: "Category of construction project (Commercial, Residential, Infrastructure, etc.)."
          - name: LOCATION
            description: "City and state where the project is located."
          - name: PROJECT_MANAGER
            description: "Apex Build Co employee managing this project."
          - name: CONTRACT_VALUE
            description: "Total value of the signed contract in USD."
          - name: BUDGET
            description: "Approved internal budget for the project in USD."
          - name: ACTUAL_COST_TO_DATE
            description: "Total costs incurred on the project to date in USD."
          - name: START_DATE
            description: "Date construction commenced."
          - name: EXPECTED_END_DATE
            description: "Contractual completion deadline."
          - name: ACTUAL_END_DATE
            description: "Actual date project was completed (NULL if still active)."
          - name: STATUS
            description: "Current project status — ACTIVE or COMPLETED."
          - name: COMPLETION_PCT
            description: "Actual percentage of work completed to date."
          - name: EXPECTED_COMPLETION_PCT
            description: "Planned completion percentage based on schedule."
          - name: RISK_LEVEL
            description: "Project risk classification — LOW, MEDIUM, or HIGH."
          - name: PAYMENT_TERMS
            description: "Agreed payment terms — NET30 or NET45."
          - name: RETAINAGE_PCT
            description: "Percentage of each payment withheld as retainage."
          - name: PERMIT_NUMBER
            description: "Building permit number issued by the municipality."
          - name: CREATED_DATE
            description: "Date the project record was created in the system."

      - name: job_costs
        description: "Job costing records — subcontractor invoices and cost entries by project. One row per cost entry."
        columns:
          - name: COST_ID
            description: "Unique cost entry ID from the job costing system (primary key)."
          - name: PROJECT_ID
            description: "Foreign key to PROJECTS."
          - name: COST_DATE
            description: "Date the cost was incurred or invoice was issued."
          - name: DUE_DATE
            description: "Date by which payment must be made to the subcontractor."
          - name: VENDOR_NAME
            description: "Name of the subcontractor or supplier issuing the invoice."
          - name: COST_TYPE
            description: "Type of cost — SUBCONTRACT, MATERIAL, EQUIPMENT, LABOR, or OVERHEAD."
          - name: CATEGORY
            description: "Detailed cost category (Electrical, Plumbing, Concrete, etc.)."
          - name: DESCRIPTION
            description: "Free-text description of the work or materials."
          - name: INVOICE_AMOUNT
            description: "Total invoice value in USD."
          - name: PAID_AMOUNT
            description: "Amount already paid against this invoice in USD."
          - name: STATUS
            description: "Current payment status — PAID, PENDING, or OVERDUE."
          - name: APPROVER
            description: "Project manager responsible for approving payment."
          - name: PAYMENT_METHOD
            description: "Method of payment — ACH, WIRE, or CHECK."
          - name: COST_CODE
            description: "CSI or internal cost code for this work item."
          - name: NOTES
            description: "Additional notes or budget tracking flags."

      - name: dbt_model_config
        description: "Config metadata table populated by scripts/load_config_to_snowflake.py from config/model_config.yml."
        columns:
          - name: TARGET_MODEL
            description: "Name of the dbt staging model this row configures."
          - name: COLUMN_NAME
            description: "Name of the column in the source table."
          - name: LOADED_AT
            description: "Timestamp when this config row was loaded."
