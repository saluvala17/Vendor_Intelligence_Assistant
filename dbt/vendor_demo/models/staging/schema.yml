version: 2

models:
  - name: stg_projects
    description: "Cleansed and enriched project master data. Adds budget variance, schedule variance, and deadline flags."
    columns:
      - name: PROJECT_ID
        description: "Unique project ID (primary key)."
        data_tests:
          - not_null
          - unique
      - name: PROJECT_NAME
        description: "Descriptive project name — uppercased and trimmed."
        data_tests:
          - not_null
      - name: CLIENT_NAME
        description: "Name of the client or project owner."
      - name: PROJECT_TYPE
        description: "Category of construction project."
      - name: LOCATION
        description: "City and state where the project is located."
      - name: PROJECT_MANAGER
        description: "Apex Build Co employee managing this project."
      - name: CONTRACT_VALUE
        description: "Total contract value in USD."
      - name: BUDGET
        description: "Approved internal budget in USD."
      - name: ACTUAL_COST_TO_DATE
        description: "Total costs incurred to date in USD."
      - name: START_DATE
        description: "Construction start date."
      - name: EXPECTED_END_DATE
        description: "Contractual completion deadline."
      - name: ACTUAL_END_DATE
        description: "Actual completion date (NULL if active)."
      - name: STATUS
        description: "Current project status."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["ACTIVE", "COMPLETED"]
      - name: COMPLETION_PCT
        description: "Actual percentage of work completed."
      - name: EXPECTED_COMPLETION_PCT
        description: "Planned completion percentage based on schedule."
      - name: RISK_LEVEL
        description: "Project risk classification."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["LOW", "MEDIUM", "HIGH"]
      - name: PAYMENT_TERMS
        description: "Agreed payment terms."
        data_tests:
          - accepted_values:
              arguments:
                values: ["NET30", "NET45"]
      - name: RETAINAGE_PCT
        description: "Percentage of each payment withheld as retainage."
      - name: PERMIT_NUMBER
        description: "Building permit number."
      - name: BUDGET_VARIANCE
        description: "ACTUAL_COST_TO_DATE minus BUDGET. Positive = over budget."
      - name: BUDGET_VARIANCE_PCT
        description: "Budget variance as a percentage of approved budget."
      - name: IS_OVER_BUDGET
        description: "TRUE if actual costs exceed the approved budget."
      - name: SCHEDULE_VARIANCE_PCT
        description: "COMPLETION_PCT minus EXPECTED_COMPLETION_PCT. Negative = behind schedule."
      - name: IS_BEHIND_SCHEDULE
        description: "TRUE if actual completion is below the planned completion."
      - name: DAYS_TO_DEADLINE
        description: "Days until expected end date. Negative means past deadline."
      - name: IS_EXPIRING_SOON
        description: "TRUE if deadline is within 90 days."
      - name: DBT_LOADED_AT
        description: "Timestamp when dbt last processed this row."

  - name: stg_job_costs
    description: "Cleansed job cost data with outstanding balances, overdue tracking, and lien risk flags."
    columns:
      - name: COST_ID
        description: "Unique cost entry ID (primary key)."
        data_tests:
          - not_null
          - unique
      - name: PROJECT_ID
        description: "Foreign key to stg_projects."
        data_tests:
          - not_null
      - name: COST_DATE
        description: "Date the cost was incurred."
        data_tests:
          - not_null
      - name: DUE_DATE
        description: "Payment due date."
        data_tests:
          - not_null
      - name: VENDOR_NAME
        description: "Subcontractor or supplier name."
      - name: COST_TYPE
        description: "Type of cost entry."
        data_tests:
          - accepted_values:
              arguments:
                values: ["SUBCONTRACT", "MATERIAL", "EQUIPMENT", "LABOR", "OVERHEAD"]
      - name: CATEGORY
        description: "Detailed cost category (Electrical, Plumbing, etc.)."
      - name: DESCRIPTION
        description: "Free-text description of the work or materials."
      - name: INVOICE_AMOUNT
        description: "Total invoice value in USD."
        data_tests:
          - not_null
      - name: PAID_AMOUNT
        description: "Amount paid to date in USD."
      - name: STATUS
        description: "Current payment status."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["PAID", "PENDING", "OVERDUE"]
      - name: APPROVER
        description: "Project manager approving payment."
      - name: PAYMENT_METHOD
        description: "Method of payment."
        data_tests:
          - accepted_values:
              arguments:
                values: ["ACH", "WIRE", "CHECK"]
      - name: COST_CODE
        description: "CSI or internal cost code."
      - name: OUTSTANDING_AMOUNT
        description: "Remaining unpaid balance (INVOICE_AMOUNT - PAID_AMOUNT)."
      - name: DAYS_OVERDUE
        description: "Days past the due date. Positive = overdue."
      - name: LIEN_RISK
        description: "TRUE if the cost entry is OVERDUE — unpaid subs create lien risk."
      - name: DBT_LOADED_AT
        description: "Timestamp when dbt last processed this row."
