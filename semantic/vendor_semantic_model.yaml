semantic_models:
  - name: project_360
    description: >
      360-degree construction project intelligence model. Combines project master data
      with job cost aggregates and composite risk scoring. Primary semantic layer
      consumed by the AI chatbot and executive dashboards.
    model: ref('mart_project_360')

    entities:
      - name: project
        type: primary
        expr: PROJECT_ID

    dimensions:
      - name: project_name
        type: categorical
        expr: PROJECT_NAME
        description: Descriptive name of the construction project.

      - name: client_name
        type: categorical
        expr: CLIENT_NAME
        description: Name of the client or project owner.

      - name: project_type
        type: categorical
        expr: PROJECT_TYPE
        description: Category of construction project (Commercial, Residential, Infrastructure, etc.).

      - name: project_manager
        type: categorical
        expr: PROJECT_MANAGER
        description: Apex Build Co employee managing this project.

      - name: location
        type: categorical
        expr: LOCATION
        description: City and state where the project is located.

      - name: risk_level
        type: categorical
        expr: RISK_LEVEL
        description: Project risk classification — LOW, MEDIUM, or HIGH.

      - name: payment_terms
        type: categorical
        expr: PAYMENT_TERMS
        description: Agreed payment terms — NET30 or NET45.

      - name: project_status
        type: categorical
        expr: STATUS
        description: Current project status — ACTIVE or COMPLETED.

      - name: risk_score_category
        type: categorical
        expr: RISK_SCORE_CATEGORY
        description: Composite risk category — CRITICAL, WATCH, or STABLE.

      - name: expected_end_date
        type: time
        type_params:
          time_granularity: day
        expr: EXPECTED_END_DATE
        description: Contractual project completion deadline.

      - name: is_expiring_soon
        type: categorical
        expr: IS_EXPIRING_SOON
        description: TRUE if project deadline is within 90 days.

      - name: is_over_budget
        type: categorical
        expr: IS_OVER_BUDGET
        description: TRUE if actual costs exceed the approved budget.

      - name: is_behind_schedule
        type: categorical
        expr: IS_BEHIND_SCHEDULE
        description: TRUE if actual completion is below the planned completion percentage.

      - name: has_overdue_costs
        type: categorical
        expr: HAS_OVERDUE_COSTS
        description: TRUE if the project has at least one OVERDUE job cost entry (lien risk).

    measures:
      - name: total_cost_amount
        description: Sum of all job cost invoice amounts for projects matching the filter.
        agg: sum
        expr: TOTAL_COST_AMOUNT

      - name: total_outstanding_amount
        description: Total outstanding (unpaid) balance across projects.
        agg: sum
        expr: TOTAL_OUTSTANDING_AMOUNT

      - name: total_paid_amount
        description: Total amount paid on projects.
        agg: sum
        expr: TOTAL_PAID_AMOUNT

      - name: total_budget
        description: Sum of approved budgets across projects.
        agg: sum
        expr: BUDGET

      - name: total_contract_value
        description: Sum of contract values across projects.
        agg: sum
        expr: CONTRACT_VALUE

      - name: project_count
        description: Number of distinct projects.
        agg: count_distinct
        expr: PROJECT_ID

      - name: overdue_cost_count
        description: Total number of overdue job cost entries.
        agg: sum
        expr: OVERDUE_COST_COUNT

      - name: pending_cost_count
        description: Total number of pending job cost entries.
        agg: sum
        expr: PENDING_COST_COUNT

      - name: avg_days_overdue
        description: Average number of days job costs are past their due date.
        agg: average
        expr: AVG_DAYS_OVERDUE

      - name: avg_budget_variance_pct
        description: Average budget variance percentage across projects.
        agg: average
        expr: BUDGET_VARIANCE_PCT

      - name: avg_risk_score
        description: Average composite risk score.
        agg: average
        expr: RISK_SCORE

saved_queries:
  - name: overdue_by_project
    description: Outstanding balance and overdue cost count grouped by project with lien risk.
    query_params:
      metrics:
        - total_outstanding_amount
        - overdue_cost_count
        - avg_days_overdue
      group_by:
        - project_name
        - project_manager
        - risk_level
      where:
        - "{{ Dimension('project__has_overdue_costs') }} = TRUE"
      order_by:
        - metric(total_outstanding_amount) desc

  - name: over_budget_projects
    description: Projects where actual spend exceeds the approved budget.
    query_params:
      metrics:
        - total_outstanding_amount
        - avg_budget_variance_pct
      group_by:
        - project_name
        - project_manager
        - risk_level
      where:
        - "{{ Dimension('project__is_over_budget') }} = TRUE"
      order_by:
        - metric(avg_budget_variance_pct) desc

  - name: critical_project_watchlist
    description: Projects classified as CRITICAL risk requiring immediate executive attention.
    query_params:
      metrics:
        - total_outstanding_amount
        - overdue_cost_count
        - avg_days_overdue
        - avg_budget_variance_pct
      group_by:
        - project_name
        - project_manager
        - risk_level
        - risk_score_category
        - is_over_budget
        - is_behind_schedule
      where:
        - "{{ Dimension('project__risk_score_category') }} = 'CRITICAL'"
      order_by:
        - metric(total_outstanding_amount) desc

  - name: deadline_watchlist
    description: Projects with deadlines expiring within 90 days.
    query_params:
      metrics:
        - total_outstanding_amount
        - total_budget
      group_by:
        - project_name
        - project_manager
        - risk_level
        - expected_end_date
      where:
        - "{{ Dimension('project__is_expiring_soon') }} = TRUE"
      order_by:
        - dimension(expected_end_date) asc
