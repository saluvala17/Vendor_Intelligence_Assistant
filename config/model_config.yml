version: "1.0"
last_updated: "2026-05-23"
author: "Santhosh Aluvala"
description: >
  Single source of truth for all dbt model configurations.
  Edit this file to add columns, change materializations,
  or add new source tables. Push to GitHub and CI/CD
  handles everything automatically.

models:

  - source_schema: RAW
    source_table: PROJECTS
    target_schema: STAGING
    target_model: STG_PROJECTS
    materialization: view
    unique_key: PROJECT_ID
    load_type: FULL
    is_active: true
    columns:
      - name: PROJECT_ID
        data_type: VARCHAR
        business_name: Project Identifier
        description: Unique project ID from the project management system
        is_pk: true
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: true
          accepted_values: []
      - name: PROJECT_NAME
        data_type: VARCHAR
        business_name: Project Name
        description: Descriptive name of the construction project
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: []
      - name: CLIENT_NAME
        data_type: VARCHAR
        business_name: Client Name
        description: Name of the client or owner of the project
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: PROJECT_TYPE
        data_type: VARCHAR
        business_name: Project Type
        description: Category of construction project
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: LOCATION
        data_type: VARCHAR
        business_name: Project Location
        description: City and state where the project is located
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: PROJECT_MANAGER
        data_type: VARCHAR
        business_name: Project Manager
        description: Apex Build Co employee managing this project
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: CONTRACT_VALUE
        data_type: NUMBER
        business_name: Contract Value USD
        description: Total value of the signed contract in USD
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: BUDGET
        data_type: NUMBER
        business_name: Approved Budget USD
        description: Approved internal budget for the project in USD
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: ACTUAL_COST_TO_DATE
        data_type: NUMBER
        business_name: Actual Cost to Date USD
        description: Total costs incurred on the project to date in USD
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: START_DATE
        data_type: DATE
        business_name: Project Start Date
        description: Date construction commenced
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: EXPECTED_END_DATE
        data_type: DATE
        business_name: Expected End Date
        description: Contractual completion deadline
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: ACTUAL_END_DATE
        data_type: DATE
        business_name: Actual End Date
        description: Actual date project was completed (NULL if still active)
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: STATUS
        data_type: VARCHAR
        business_name: Project Status
        description: Current project status ACTIVE or COMPLETED
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: ["ACTIVE","COMPLETED"]
      - name: COMPLETION_PCT
        data_type: NUMBER
        business_name: Completion Percentage
        description: Actual percentage of work completed to date
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: EXPECTED_COMPLETION_PCT
        data_type: NUMBER
        business_name: Expected Completion Percentage
        description: Planned completion percentage based on schedule
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: RISK_LEVEL
        data_type: VARCHAR
        business_name: Risk Level
        description: Project risk classification LOW MEDIUM HIGH
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: ["LOW","MEDIUM","HIGH"]
      - name: PAYMENT_TERMS
        data_type: VARCHAR
        business_name: Payment Terms
        description: Agreed payment terms eg NET30 NET45
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: ["NET30","NET45"]
      - name: RETAINAGE_PCT
        data_type: NUMBER
        business_name: Retainage Percentage
        description: Percentage of each payment held as retainage until project completion
        is_pk: false
        is_nullable: true
        include_in_mart: false
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: PERMIT_NUMBER
        data_type: VARCHAR
        business_name: Permit Number
        description: Building permit number issued by the municipality
        is_pk: false
        is_nullable: true
        include_in_mart: false
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: CREATED_DATE
        data_type: DATE
        business_name: Created Date
        description: Date the project record was created in the system
        is_pk: false
        is_nullable: true
        include_in_mart: false
        tests:
          not_null: false
          unique: false
          accepted_values: []

  - source_schema: RAW
    source_table: JOB_COSTS
    target_schema: STAGING
    target_model: STG_JOB_COSTS
    materialization: view
    unique_key: COST_ID
    load_type: FULL
    is_active: true
    columns:
      - name: COST_ID
        data_type: VARCHAR
        business_name: Cost Entry Identifier
        description: Unique cost entry ID from the job costing system
        is_pk: true
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: true
          accepted_values: []
      - name: PROJECT_ID
        data_type: VARCHAR
        business_name: Project Identifier
        description: Foreign key to the PROJECTS table
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: []
      - name: COST_DATE
        data_type: DATE
        business_name: Cost Date
        description: Date the cost was incurred or invoice was issued
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: []
      - name: DUE_DATE
        data_type: DATE
        business_name: Payment Due Date
        description: Date by which payment must be made to the subcontractor
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: []
      - name: VENDOR_NAME
        data_type: VARCHAR
        business_name: Vendor / Subcontractor Name
        description: Name of the subcontractor or supplier issuing the invoice
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: COST_TYPE
        data_type: VARCHAR
        business_name: Cost Type
        description: Type of cost SUBCONTRACT MATERIAL EQUIPMENT LABOR OVERHEAD
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: ["SUBCONTRACT","MATERIAL","EQUIPMENT","LABOR","OVERHEAD"]
      - name: CATEGORY
        data_type: VARCHAR
        business_name: Cost Category
        description: Detailed category eg Electrical Plumbing Concrete etc
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: DESCRIPTION
        data_type: VARCHAR
        business_name: Description
        description: Free-text description of the work or materials
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: INVOICE_AMOUNT
        data_type: NUMBER
        business_name: Invoice Amount USD
        description: Total invoice value in USD
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: []
      - name: PAID_AMOUNT
        data_type: NUMBER
        business_name: Paid Amount USD
        description: Amount already paid against this invoice
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: STATUS
        data_type: VARCHAR
        business_name: Payment Status
        description: Current payment status PAID PENDING OVERDUE
        is_pk: false
        is_nullable: false
        include_in_mart: true
        tests:
          not_null: true
          unique: false
          accepted_values: ["PAID","PENDING","OVERDUE"]
      - name: APPROVER
        data_type: VARCHAR
        business_name: Payment Approver
        description: Project manager responsible for approving payment
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: PAYMENT_METHOD
        data_type: VARCHAR
        business_name: Payment Method
        description: Method of payment ACH WIRE CHECK
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: ["ACH","WIRE","CHECK"]
      - name: COST_CODE
        data_type: VARCHAR
        business_name: Cost Code
        description: CSI or internal cost code for this work item
        is_pk: false
        is_nullable: true
        include_in_mart: true
        tests:
          not_null: false
          unique: false
          accepted_values: []
      - name: NOTES
        data_type: VARCHAR
        business_name: Notes
        description: Additional notes eg budget tracking flags
        is_pk: false
        is_nullable: true
        include_in_mart: false
        tests:
          not_null: false
          unique: false
          accepted_values: []
